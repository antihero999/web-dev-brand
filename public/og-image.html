<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rexforge OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      color: white;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }
    .glow {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: rgba(232, 93, 38, 0.15);
      filter: blur(100px);
      border-radius: 50%;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 84px;
      margin: 0 0 16px 0;
      letter-spacing: -0.04em;
    }
    p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px;
      color: rgba(255, 255, 255, 0.6);
      margin: 0 0 60px 0;
      max-width: 600px;
      line-height: 1.4;
    }
    .tags {
      position: absolute;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }
    .tag {
      padding: 10px 24px;
      background: rgba(232, 93, 38, 0.1);
      border: 1px solid rgba(232, 93, 38, 0.3);
      color: #e85d26;
      border-radius: 999px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 18px;
    }
    .tag:nth-child(even) {
      color: #9b5de5;
      background: rgba(155, 93, 229, 0.1);
      border-color: rgba(155, 93, 229, 0.3);
    }
    .footer {
      position: absolute;
      bottom: 80px;
      left: 80px;
      font-family: 'JetBrains Mono', monospace;
      color: #e85d26;
      font-size: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <h1>Rexforge</h1>
  <p>Innovating the Future, One Pixel at a Time.</p>
  
  <div class="tags">
    <div class="tag">React.js</div>
    <div class="tag">Node.js</div>
    <div class="tag">Python</div>
    <div class="tag">UI/UX Design</div>
    <div class="tag">Game Dev</div>
  </div>

  <div class="footer">rexforge.com</div>
</body>
</html>
